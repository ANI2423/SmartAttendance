<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="flex">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 h-screen p-5">
        <h2 class="text-2xl font-bold mb-10">Attendance</h2>
        <ul>
            <li class="mb-4">Dashboard</li>
            <li class="mb-4">Students</li>
            <li class="mb-4">Reports</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10">

        <h1 class="text-3xl font-bold mb-5">Dashboard</h1>

        <button onclick="mark()" 
            class="bg-blue-500 px-5 py-2 rounded mb-5">
            Mark Attendance
        </button>

        <table class="w-full bg-gray-800 rounded">
            <thead>
                <tr class="bg-gray-700">
                    <th class="p-2">Name</th>
                    <th class="p-2">Date</th>
                    <th class="p-2">Time</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

    </div>
</div>

<script>
function mark() {
    fetch("/mark", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name: "TestUser"})
    });
}

function loadData() {
    fetch("/data")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("tableBody");
        table.innerHTML = "";

        data.reverse().forEach(row => {
            table.innerHTML += `
                <tr class="text-center border-b border-gray-600">
                    <td class="p-2">${row.name}</td>
                    <td class="p-2">${row.date}</td>
                    <td class="p-2">${row.time}</td>
                </tr>
            `;
        });
    });
}

// Auto refresh every 2 sec
setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
